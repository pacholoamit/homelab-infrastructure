apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: inject-priority-class-critical
  annotations:
    policies.kyverno.io/title: "Inject priorityClassName=homelab-critical for infra pods"
    policies.kyverno.io/category: "Reliability"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Inject priorityClassName=homelab-critical into Pods in infra namespaces
      (longhorn-system, ingress-nginx, kube-system, kyverno, flux-system) so
      they schedule and boot first under cold-start resource pressure (e.g.
      after a power outage). Skips pods that already specify a priorityClassName.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
  matchConditions:
    - name: in-critical-namespace
      expression: >-
        object.metadata.namespace in
          ["longhorn-system", "ingress-nginx", "kube-system", "kyverno", "flux-system"]
    - name: no-priority-class-set
      expression: >-
        !has(object.spec.priorityClassName) || object.spec.priorityClassName == ""
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              priorityClassName: "homelab-critical"
            }
          }
