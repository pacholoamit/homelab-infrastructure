apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:background-controller:volumeattachments
  labels:
    rbac.kyverno.io/aggregate-to-background-controller: "true"
  annotations:
    description: >-
      Grants the Kyverno background controller get+update on VolumeAttachments
      so the cleanup-stale-volumeattachments ClusterPolicy can clear finalizers
      from attachments referencing dead nodes. Aggregates into the
      kyverno:background-controller ClusterRole via the standard Kyverno
      aggregation label.
rules:
  - apiGroups:
      - storage.k8s.io
    resources:
      - volumeattachments
    verbs:
      - get
      - list
      - update
      - patch
