apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: inject-priority-class-rwo
  annotations:
    policies.kyverno.io/title: "Inject priorityClassName=homelab-high for Longhorn-RWO pods"
    policies.kyverno.io/category: "Reliability"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Inject priorityClassName=homelab-high into Pods that mount a Longhorn
      ReadWriteOnce PVC, so stateful apps boot before stateless ones under
      cold-start resource pressure (e.g. after a power outage). Skips pods
      that already specify a priorityClassName.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
  variables:
    - name: rwoPvcs
      expression: >-
        resource.List("v1", "persistentvolumeclaims", object.metadata.namespace).items
          .filter(p, p.spec.storageClassName == "longhorn" && "ReadWriteOnce" in p.spec.accessModes)
          .map(p, p.metadata.name)
    - name: podPvcs
      expression: >-
        has(object.spec.volumes) ?
          object.spec.volumes
            .filter(v, has(v.persistentVolumeClaim))
            .map(v, v.persistentVolumeClaim.claimName)
          : []
  matchConditions:
    - name: no-priority-class-set
      expression: >-
        !has(object.spec.priorityClassName) || object.spec.priorityClassName == ""
    - name: pod-has-pvcs
      expression: variables.podPvcs.size() > 0
    - name: namespace-has-rwo-pvcs
      expression: variables.rwoPvcs.size() > 0
    - name: pod-uses-longhorn-rwo
      expression: variables.podPvcs.filter(p, p in variables.rwoPvcs).size() > 0
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              priorityClassName: "homelab-high"
            }
          }
