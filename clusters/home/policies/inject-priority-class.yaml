apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-priority-class
  annotations:
    policies.kyverno.io/title: "Inject priorityClassName into critical workloads"
    policies.kyverno.io/category: "Reliability"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Inject priorityClassName=homelab-critical into Pods in infra namespaces
      so they schedule and boot first under cold-start resource pressure
      (e.g. after a power outage). Inject homelab-high into Pods that mount
      a Longhorn RWO PVC so stateful apps boot before stateless ones.
spec:
  background: false
  rules:
    - name: critical-namespaces
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
              namespaces:
                - longhorn-system
                - ingress-nginx
                - kube-system
                - kyverno
                - flux-system
      preconditions:
        all:
          - key: "{{ request.object.spec.priorityClassName || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: homelab-critical

    - name: longhorn-rwo-stateful-apps
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      context:
        - name: rwoPvcs
          apiCall:
            urlPath: "/api/v1/namespaces/{{ request.namespace }}/persistentvolumeclaims"
            jmesPath: "items[?spec.storageClassName=='longhorn' && contains(spec.accessModes, 'ReadWriteOnce')].metadata.name"
        - name: podPvcs
          variable:
            jmesPath: "request.object.spec.volumes[?persistentVolumeClaim != null].persistentVolumeClaim.claimName || `[]`"
      preconditions:
        all:
          - key: "{{ request.object.spec.priorityClassName || '' }}"
            operator: Equals
            value: ""
          - key: "{{ length(podPvcs) }}"
            operator: GreaterThan
            value: 0
          - key: "{{ length(intersection(rwoPvcs, podPvcs)) }}"
            operator: GreaterThan
            value: 0
      mutate:
        patchStrategicMerge:
          spec:
            priorityClassName: homelab-high
