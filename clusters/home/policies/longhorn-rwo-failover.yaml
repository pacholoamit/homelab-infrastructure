apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: longhorn-rwo-failover
  annotations:
    policies.kyverno.io/title: "Longhorn RWO Failover Settings"
    policies.kyverno.io/category: "Reliability"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Deployment
    policies.kyverno.io/description: >-
      Inject NoExecute tolerations (30s) and strategy.type=Recreate into any
      Deployment whose pod template mounts a PVC backed by the longhorn
      StorageClass with ReadWriteOnce access mode. This ensures pods reschedule
      onto a healthy node within ~1 minute when a worker node fails, instead
      of the default 5+ minute delay that produces Multi-Attach errors.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        resources: ["deployments"]
        operations: ["CREATE", "UPDATE"]
  variables:
    - name: rwoPvcs
      expression: 'dyn(resource.List("v1", "persistentvolumeclaims", object.metadata.namespace).items).filter(p, p.spec.storageClassName == "longhorn" && dyn(p.spec.accessModes).exists(a, a == "ReadWriteOnce")).map(p, p.metadata.name)'
    - name: deploymentPvcs
      expression: 'has(object.spec.template.spec.volumes) ? object.spec.template.spec.volumes.filter(v, has(v.persistentVolumeClaim)).map(v, v.persistentVolumeClaim.claimName) : []'
  matchConditions:
    - name: deployment-has-pvcs
      expression: variables.deploymentPvcs.size() > 0
    - name: namespace-has-rwo-pvcs
      expression: variables.rwoPvcs.size() > 0
    - name: deployment-uses-longhorn-rwo
      expression: variables.deploymentPvcs.filter(p, p in variables.rwoPvcs).size() > 0
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: |
          [
            JSONPatch{
              op: "replace",
              path: "/spec/strategy",
              value: {"type": dyn("Recreate")}
            },
            JSONPatch{
              op: (has(object.spec.template.spec.tolerations) ? "replace" : "add"),
              path: "/spec/template/spec/tolerations",
              value:
                (has(object.spec.template.spec.tolerations) ?
                  object.spec.template.spec.tolerations.filter(t,
                    !(t.key == "node.kubernetes.io/unreachable" && t.effect == "NoExecute") &&
                    !(t.key == "node.kubernetes.io/not-ready" && t.effect == "NoExecute"))
                  : []) + [
                  {
                    "key": dyn("node.kubernetes.io/unreachable"),
                    "operator": dyn("Exists"),
                    "effect": dyn("NoExecute"),
                    "tolerationSeconds": dyn(30)
                  },
                  {
                    "key": dyn("node.kubernetes.io/not-ready"),
                    "operator": dyn("Exists"),
                    "effect": dyn("NoExecute"),
                    "tolerationSeconds": dyn(30)
                  }
                ]
            }
          ]
