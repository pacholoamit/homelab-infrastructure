apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: longhorn-rwo-failover
  annotations:
    policies.kyverno.io/title: "Longhorn RWO Failover Settings"
    policies.kyverno.io/category: "Reliability"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Deployment
    policies.kyverno.io/description: >-
      Inject NoExecute tolerations (30s) and strategy.type=Recreate into any
      Deployment whose pod template mounts a PVC backed by the longhorn
      StorageClass with ReadWriteOnce access mode. This ensures pods reschedule
      onto a healthy node within ~1 minute when a worker node fails, instead
      of the default 5+ minute delay that produces Multi-Attach errors.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        resources: ["deployments"]
        operations: ["CREATE", "UPDATE"]
  variables:
    - name: rwoPvcs
      expression: >-
        resource.List("v1", "persistentvolumeclaims", object.metadata.namespace).items
          .filter(p, p.spec.storageClassName == "longhorn" && "ReadWriteOnce" in p.spec.accessModes)
          .map(p, p.metadata.name)
    - name: deploymentPvcs
      expression: >-
        has(object.spec.template.spec.volumes) ?
          object.spec.template.spec.volumes
            .filter(v, has(v.persistentVolumeClaim))
            .map(v, v.persistentVolumeClaim.claimName)
          : []
  matchConditions:
    - name: deployment-uses-longhorn-rwo
      expression: variables.deploymentPvcs.exists(p, p in variables.rwoPvcs)
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              strategy: Object.spec.strategy{
                type: "Recreate"
              },
              template: Object.spec.template{
                spec: Object.spec.template.spec{
                  tolerations: [
                    Object.spec.template.spec.tolerations.item{
                      key: "node.kubernetes.io/unreachable",
                      operator: "Exists",
                      effect: "NoExecute",
                      tolerationSeconds: 30
                    },
                    Object.spec.template.spec.tolerations.item{
                      key: "node.kubernetes.io/not-ready",
                      operator: "Exists",
                      effect: "NoExecute",
                      tolerationSeconds: 30
                    }
                  ]
                }
              }
            }
          }
