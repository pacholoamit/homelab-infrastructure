apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: longhorn-rwo-image-pull-always
  annotations:
    policies.kyverno.io/title: "Force imagePullPolicy=Always on Longhorn-backed apps"
    policies.kyverno.io/category: "Reliability"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Deployment
    policies.kyverno.io/description: >-
      Set imagePullPolicy=Always on every container in any Deployment whose
      pod template mounts a PVC backed by the longhorn StorageClass with
      ReadWriteOnce access mode. After unclean node shutdowns, containerd's
      image cache can become corrupt (observed: tini "exec format error"). With
      Always, the kubelet re-fetches digests on each restart, working around
      cache corruption on the new scheduling node. Trade-off: extra registry
      round-trip per pod start (cheap; stays cached at registry layer).
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        resources: ["deployments"]
        operations: ["CREATE", "UPDATE"]
  variables:
    - name: rwoPvcs
      expression: 'resource.List("v1", "persistentvolumeclaims", object.metadata.namespace).items.filter(p, p.spec.storageClassName == "longhorn" && p.spec.accessModes.exists(a, a == "ReadWriteOnce")).map(p, p.metadata.name)'
    - name: deploymentPvcs
      expression: 'has(object.spec.template.spec.volumes) ? object.spec.template.spec.volumes.filter(v, has(v.persistentVolumeClaim)).map(v, v.persistentVolumeClaim.claimName) : []'
  matchConditions:
    - name: deployment-has-pvcs
      expression: variables.deploymentPvcs.size() > 0
    - name: namespace-has-rwo-pvcs
      expression: variables.rwoPvcs.size() > 0
    - name: deployment-uses-longhorn-rwo
      expression: variables.deploymentPvcs.filter(p, p in variables.rwoPvcs).size() > 0
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              template: Object.spec.template{
                spec: Object.spec.template.spec{
                  containers: object.spec.template.spec.containers.map(c,
                    Object.spec.template.spec.containers.item{
                      name: c.name,
                      imagePullPolicy: "Always"
                    })
                }
              }
            }
          }
