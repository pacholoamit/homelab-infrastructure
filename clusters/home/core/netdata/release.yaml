apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: netdata
spec:
  interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: netdata
      version: "3.x.x"
      sourceRef:
        kind: HelmRepository
        name: netdata
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: Secret
      name: netdata-claiming
  values:
    image:
      tag: stable
    parent:
      claiming:
        enabled: true
      database:
        storageclass: longhorn
        volumesize: 8Gi
      alarms:
        storageclass: longhorn
        volumesize: 2Gi
    child:
      claiming:
        enabled: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: netdata-k8s-state
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: netdata-k8s-state
                annotations:
                  glance/hide: "true"
          - target:
              kind: DaemonSet
              name: netdata-child
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: netdata-child
                annotations:
                  glance/hide: "true"
          - target:
              kind: Deployment
              name: netdata-parent
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: netdata-parent
                annotations:
                  glance/name: Netdata
                  glance/icon: di:netdata
