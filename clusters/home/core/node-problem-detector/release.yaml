apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-problem-detector
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: node-problem-detector
      version: "2.3.x"
      sourceRef:
        kind: HelmRepository
        name: deliveryhero
        namespace: flux-system
      interval: 30m
  values:
    metrics:
      enabled: false
    hostNetwork: true
    settings:
      log_monitors:
        - /config/kernel-monitor.json
      custom_plugin_monitors: []
    tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
