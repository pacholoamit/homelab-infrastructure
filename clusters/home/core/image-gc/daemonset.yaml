apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-gc
  namespace: image-gc
  labels:
    app: image-gc
spec:
  selector:
    matchLabels:
      app: image-gc
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: image-gc
    spec:
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      terminationGracePeriodSeconds: 10
      containers:
        - name: image-gc
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              CRICTL_VERSION=v1.30.0
              if ! command -v crictl >/dev/null 2>&1; then
                apk add --no-cache --quiet curl tar
                curl -fsSL -o /tmp/crictl.tgz \
                  "https://github.com/kubernetes-sigs/cri-tools/releases/download/${CRICTL_VERSION}/crictl-${CRICTL_VERSION}-linux-amd64.tar.gz"
                tar -xzf /tmp/crictl.tgz -C /usr/local/bin
                rm -f /tmp/crictl.tgz
              fi
              while true; do
                echo "[$(date -Iseconds)] pruning unused images on ${NODE_NAME:-$(hostname)}"
                crictl --runtime-endpoint unix:///run/k3s/containerd/containerd.sock rmi --prune || echo "prune failed (will retry next cycle)"
                echo "[$(date -Iseconds)] next prune in 7 days"
                sleep 604800
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 64Mi
          volumeMounts:
            - name: containerd-sock
              mountPath: /run/k3s/containerd
              readOnly: false
      volumes:
        - name: containerd-sock
          hostPath:
            path: /run/k3s/containerd
            type: Directory
