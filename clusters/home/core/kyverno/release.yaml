apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      # Bumped to 3.8.0-rc.1 (Kyverno v1.18.0-rc.1) for the MutatingPolicy
      # CEL compiler fixes — specifically #15669 ("use extended compiler for
      # mpol variables and conditions"), #15453 ("handle mutating policy
      # variable compile errors"), and #15625 ("inject namespaceObject into
      # MutatingPolicy CEL context"). v1.17.x panics with nil pointer
      # dereference whenever a MutatingPolicy variable calls resource.List()
      # which makes auto-detection-style policies (e.g. longhorn-rwo-failover)
      # silently no-op. RC version; revisit once 3.8.x stable lands.
      version: "3.8.0-rc.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 1h
  values:
    admissionController:
      replicas: 3
      container:
        image:
          pullPolicy: Always
      initContainer:
        image:
          pullPolicy: Always
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - admission-controller
            topologyKey: kubernetes.io/hostname
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
    backgroundController:
      replicas: 1
    cleanupController:
      replicas: 1
    reportsController:
      replicas: 1
    features:
      admissionReports:
        enabled: true
      backgroundScan:
        enabled: false
