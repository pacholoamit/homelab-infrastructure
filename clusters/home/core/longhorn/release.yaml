apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 168h # 7 days
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  values:
    persistence:
      defaultClass: false
      defaultDataLocality: best-effort
    defaultSettings:
      backupTarget: s3://velero-k3s-cluster-backups@ap-southeast-1/longhorn-backups
      backupTargetCredentialSecret: longhorn-aws-credentials
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      detachManuallyAttachedVolumesWhenCordoned: true
      guaranteedInstanceManagerCPU: "10"
      v2DataEngine: false
      v1DataEngine: true
      orphanAutoDeletion: true
      rwxVolumeFastFailover: true
      autoCleanupSnapshotWhenDeleteBackup: true
      restoreVolumeRecurringJobs: true
      replicaAutoBalance: best-effort
      replicaReplenishmentWaitInterval: "0"
      nodeDrainPolicy: block-for-eviction-if-contains-last-replica
      autoSalvage: true
      replicaSoftAntiAffinity: false
      replicaZoneSoftAntiAffinity: false
      concurrentReplicaRebuildPerNodeLimit: 5
      concurrentVolumeBackupRestorePerNodeLimit: 5
      disableSchedulingOnCordonedNode: true
      defaultDataLocality: best-effort
      systemManagedComponentsNodeSelector: ""
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: longhorn-iscsi-installation
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: longhorn-iscsi-installation
                annotations:
                  glance/hide: "true"
          - target:
              kind: DaemonSet
              name: longhorn-nfs-installation
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: longhorn-nfs-installation
                annotations:
                  glance/hide: "true"
          - target:
              kind: DaemonSet
              name: longhorn-nvme-cli-installation
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: longhorn-nvme-cli-installation
                annotations:
                  glance/hide: "true"
          - target:
              kind: DaemonSet
              name: longhorn-spdk-setup
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: longhorn-spdk-setup
                annotations:
                  glance/hide: "true"
          - target:
              kind: Deployment
              name: longhorn-ui
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: longhorn-ui
                annotations:
                  glance/name: Longhorn
                  glance/icon: di:longhorn