apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperclip-operator
  namespace: paperclip-operator-system
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: paperclip-operator
      version: "0.11.x"
      sourceRef:
        kind: HelmRepository
        name: paperclipinc
        namespace: flux-system
      interval: 1m
  values:
    crds:
      install: true
      keep: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
    networkPolicy:
      enabled: false
    leaderElection:
      enabled: true
