apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: default
spec:
  interval: 5m
  install:
      createNamespace: true
      crds: CreateReplace
      remediation:
          retries: 3
  upgrade:
      crds: CreateReplace
      remediation:
          retries: 3
  chart:
    spec:
      chart: n8n
      version: "2.x.x"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: n8nio/n8n
      tag: 2.18.7
      pullPolicy: IfNotPresent

    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: 999m
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: Open source workflow automation tool
        gethomepage.dev/group: Apps/Services
        gethomepage.dev/icon: n8n.png
        gethomepage.dev/name: n8n
        gethomepage.dev/weight: "2"
        glance/name: "n8n"
        glance/icon: "si:n8n"
      hosts:
        - host: n8n.pacholoamit.com
          paths:
            - path: /
              pathType: Prefix

    main:
      replicaCount: 1

      service:
        type: LoadBalancer
        port: 80

      # YAML keys are recursively upper-cased and joined with `_` to form n8n env vars
      # (chart 2.x replaces 0.x's JSON config file with env-var-based config)
      config:
        n8n:
          host: n8n.pacholoamit.com
          protocol: https
          port: 443
        generic:
          timezone: Asia/Manila
        db:
          type: sqlite
        executions:
          data:
            prune: "true"
            max_age: 3760

      # Each entry must be a full env-source spec (value: or valueFrom:);
      # 2.x chart toYaml's the value into the env item — flat strings break rendering.
      extraEnv:
        WEBHOOK_TUNNEL_URL:
          value: https://n8n.pacholoamit.com
        WEBHOOK_URL:
          value: https://n8n.pacholoamit.com
        N8N_EDITOR_BASE_URL:
          value: https://n8n.pacholoamit.com

      persistence:
        enabled: true
        type: existing
        existingClaim: pvc-13c2362e-68a6-4532-ae4e-fc2-7f1d8185

    worker:
      enabled: false
    webhook:
      enabled: false
    valkey:
      enabled: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: n8n
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: n8n
                annotations:
                  glance/name: n8n
                  glance/icon: di:n8n
