apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
  namespace: default
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: pocket-id
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: pocket-id
        namespace: flux-system
      interval: 1m
  values:
    config:
      appUrl: "https://pocketid.pacholoamit.com"
      trustProxy: "true"
      smtpHost: "smtp.resend.com"
      smtpPort: "587"
      smtpFrom: "noreply@pacholoamit.com"
    existingSecret: pocket-id-secrets
    persistence:
      enabled: true
      storageClass: longhorn
      size: 2Gi
      accessMode: ReadWriteOnce
    service:
      type: ClusterIP
      port: 1411
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: pocket-id
            patch: |
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: pocket-id
                annotations:
                  glance/name: Pocket ID
                  glance/icon: si:openid
