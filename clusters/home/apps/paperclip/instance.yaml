apiVersion: paperclip.inc/v1alpha1
kind: Instance
metadata:
  name: paperclip
  namespace: paperclip
spec:
  image:
    repository: ghcr.io/paperclipinc/paperclip
    tag: "2026.0403"
    autoUpdate:
      enabled: true
      interval: "1h"

  # Use Claude Code subscription auth (Pro/Max) via a long-lived OAuth token
  # generated locally with `claude setup-token`. ANTHROPIC_API_KEY would take
  # precedence and force metered API-key auth, so we explicitly do NOT set it
  # (apiKeysSecretRef removed below).
  env:
    - name: CLAUDE_CODE_OAUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-claude-oauth
          key: CLAUDE_CODE_OAUTH_TOKEN
    # Prepend our self-installed claude binary so the Claude (local) adapter
    # finds it. Image tag 2026.0403 doesn't ship @anthropic-ai/claude-code;
    # we install it via the init container below into a Longhorn-backed PVC
    # so the install persists across pod restarts.
    - name: PATH
      value: "/opt/claude/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    # paperclip-operator >=0.10.1 unconditionally injects
    #   NODE_OPTIONS=--import ./server/dist/instrumentation.js
    # for OTEL instrumentation (statefulset.go, no gating). The relative path
    # resolves against the server's own cwd, but when the claude_local adapter
    # spawns /opt/claude/bin/claude with cwd=<workspace>, the child inherits
    # NODE_OPTIONS and Node fails with ERR_MODULE_NOT_FOUND because
    # ./server/dist/instrumentation.js doesn't exist in the workspace. The
    # operator appends spec.env last (last-wins), so this override clears it.
    # Cluster has no OTEL collector deployed, so the OTEL hook was a no-op
    # anyway; nothing of value is lost.
    - name: NODE_OPTIONS
      value: ""
    # GitHub PAT for the coder agent's heartbeat. `gh` reads GH_TOKEN; git's
    # HTTPS credential helper reads GITHUB_TOKEN — set both so `git push` and
    # `gh pr create` work without an extra credential helper. See:
    # docs.paperclip.ing/#/how-to/connect-agent-to-github/connect-an-agent-to-a-github-repo-and-have-it-open-prs
    - name: GH_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-github-pat
          key: GH_TOKEN
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-github-pat
          key: GITHUB_TOKEN

  initContainers:
    - name: install-claude
      image: ghcr.io/paperclipinc/paperclip:2026.0403
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c"]
      args:
        # Installs both claude-code (npm) and gh CLI (release tarball) into the
        # Longhorn-backed /opt/claude PVC so they persist across restarts.
        # Image tag 2026.0403 ships neither. Pinned for reproducibility — bump
        # WANT / GH_WANT and re-roll to upgrade. v2.1+ claude-code is a
        # Bun-compiled native binary that needs AVX/SSE4.2; cluster VMs use
        # Proxmox "host" CPU type (May 2026) so those flags are exposed.
        - |
          set -eu

          # --- claude-code ---
          WANT="2.1.136"
          PKG="/opt/claude/lib/node_modules/@anthropic-ai/claude-code/package.json"
          INSTALLED=""
          if [ -f "$PKG" ]; then
            INSTALLED=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' "$PKG" | head -1)
          fi
          if [ "$INSTALLED" = "$WANT" ] && [ -x /opt/claude/bin/claude ]; then
            echo "claude-code $WANT already installed; skipping"
          else
            echo "installing @anthropic-ai/claude-code@$WANT (was: ${INSTALLED:-none})"
            # Narrow the bin wipe to /opt/claude/bin/claude so a re-run that
            # only bumps WANT doesn't blow away gh installed below.
            rm -rf /opt/claude/lib /opt/claude/bin/claude /opt/claude/share /opt/claude/etc 2>/dev/null || true
            NPM_CONFIG_PREFIX=/opt/claude npm install -g --omit=dev "@anthropic-ai/claude-code@$WANT"
            test -x /opt/claude/bin/claude
            /opt/claude/bin/claude --version
          fi

          # --- gh CLI (for the agent's `git push` + `gh pr create` flow) ---
          GH_WANT="2.65.0"
          GH_BIN="/opt/claude/bin/gh"
          GH_INSTALLED=""
          if [ -x "$GH_BIN" ]; then
            GH_INSTALLED=$("$GH_BIN" --version 2>/dev/null | head -1 | awk '{print $3}')
          fi
          if [ "$GH_INSTALLED" = "$GH_WANT" ]; then
            echo "gh $GH_WANT already installed; skipping"
          else
            echo "installing gh $GH_WANT (was: ${GH_INSTALLED:-none})"
            mkdir -p /opt/claude/bin
            TMP=$(mktemp -d)
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_WANT}/gh_${GH_WANT}_linux_amd64.tar.gz" \
              | tar -xz -C "$TMP" --strip-components=1
            install -m 0755 "$TMP/bin/gh" "$GH_BIN"
            rm -rf "$TMP"
            "$GH_BIN" --version
          fi
      volumeMounts:
        - name: claude-bin
          mountPath: /opt/claude

  extraVolumes:
    - name: claude-bin
      persistentVolumeClaim:
        claimName: paperclip-claude-bin

  extraVolumeMounts:
    - name: claude-bin
      mountPath: /opt/claude
      readOnly: true

  deployment:
    mode: authenticated
    exposure: public
    publicURL: https://paperclip.pacholoamit.com
    allowedHostnames:
      - paperclip.pacholoamit.com

  database:
    mode: managed
    managed:
      storageSize: 10Gi
      storageClass: longhorn
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi


  auth:
    secretRef:
      name: paperclip-auth
      key: BETTER_AUTH_SECRET

  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: longhorn

  # adapters.apiKeysSecretRef intentionally omitted — its sole effect is to
  # inject ANTHROPIC_API_KEY / OPENAI_API_KEY env vars from the named Secret,
  # and ANTHROPIC_API_KEY would override CLAUDE_CODE_OAUTH_TOKEN per Claude
  # Code's auth precedence (https://code.claude.com/docs/en/authentication).
  # Re-enable this if you ever need OPENAI_API_KEY or want metered API auth.

  # Third-party OAuth providers (GitHub, Slack, etc.) for the Paperclip
  # connections system. The secret holds a JSON map keyed by provider id;
  # the operator injects it into the pod as the env var PAPERCLIP_OAUTH_CREDENTIALS.
  # OAuth callback URL to register with each provider:
  #   https://paperclip.pacholoamit.com/api/connections/callback
  connections:
    credentialsSecretRef:
      name: paperclip-oauth-credentials

  heartbeat:
    enabled: true
    intervalMS: 60000

  security:
    networkPolicy:
      enabled: false
    rbac:
      create: true
    # The upstream Paperclip image's entrypoint starts as root and `gosu node`-
    # drops to UID 1000. The operator's restricted-PSS default (runAsNonRoot,
    # drop ALL caps, no privilege escalation) makes gosu fail with EPERM:
    #   "error: failed switching to \"node\": operation not permitted"
    # Override to permit a root-start; the actual Node.js server still runs as
    # UID 1000 inside the container after gosu drops privileges.
    podSecurityContext:
      fsGroup: 1000
      runAsNonRoot: false
    containerSecurityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]
        add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, FOWNER]

  networking:
    service:
      type: ClusterIP
      port: 3100
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - paperclip.pacholoamit.com
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "100m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: AI agent orchestration platform
        gethomepage.dev/group: Apps/Services
        gethomepage.dev/name: Paperclip

  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
    logging:
      level: info

  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi
