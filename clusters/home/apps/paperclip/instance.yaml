apiVersion: paperclip.inc/v1alpha1
kind: Instance
metadata:
  name: paperclip
  namespace: paperclip
spec:
  image:
    repository: ghcr.io/paperclipinc/paperclip
    tag: "2026.0403"
    autoUpdate:
      enabled: true
      interval: "1h"

  deployment:
    mode: authenticated
    exposure: public
    publicURL: https://paperclip.pacholoamit.com
    allowedHostnames:
      - paperclip.pacholoamit.com

  database:
    mode: managed
    managed:
      storageSize: 10Gi
      storageClass: longhorn
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi

  auth:
    secretRef:
      name: paperclip-auth
      key: BETTER_AUTH_SECRET

  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: longhorn

  adapters:
    apiKeysSecretRef:
      name: paperclip-api-keys

  heartbeat:
    enabled: true
    intervalMS: 60000

  security:
    networkPolicy:
      enabled: false
    rbac:
      create: true
    # The upstream Paperclip image's entrypoint starts as root and `gosu node`-
    # drops to UID 1000. The operator's restricted-PSS default (runAsNonRoot,
    # drop ALL caps, no privilege escalation) makes gosu fail with EPERM:
    #   "error: failed switching to \"node\": operation not permitted"
    # Override to permit a root-start; the actual Node.js server still runs as
    # UID 1000 inside the container after gosu drops privileges.
    podSecurityContext:
      fsGroup: 1000
      runAsNonRoot: false
    containerSecurityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]
        add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, FOWNER]

  networking:
    service:
      type: ClusterIP
      port: 3100
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - paperclip.pacholoamit.com
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "100m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: AI agent orchestration platform
        gethomepage.dev/group: Apps/Services
        gethomepage.dev/name: Paperclip

  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
    logging:
      level: info

  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi
