apiVersion: paperclip.inc/v1alpha1
kind: Instance
metadata:
  name: paperclip
  namespace: paperclip
spec:
  image:
    repository: ghcr.io/paperclipinc/paperclip
    tag: "2026.0420"
    autoUpdate:
      enabled: true
      interval: "1h"

  # Use Claude Code subscription auth (Pro/Max) via a long-lived OAuth token
  # generated locally with `claude setup-token`. ANTHROPIC_API_KEY would take
  # precedence and force metered API-key auth, so we explicitly do NOT set it
  # (apiKeysSecretRef removed below).
  env:
    - name: CLAUDE_CODE_OAUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: paperclip-claude-oauth
          key: CLAUDE_CODE_OAUTH_TOKEN
    # Prepend our self-installed claude binary so the Claude (local) adapter
    # finds it. Image tag 2026.0403 doesn't ship @anthropic-ai/claude-code;
    # we install it via the init container below into a Longhorn-backed PVC
    # so the install persists across pod restarts.
    - name: PATH
      value: "/opt/claude/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

  initContainers:
    - name: install-claude
      image: ghcr.io/paperclipinc/paperclip:2026.0420
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          if [ -x /opt/claude/bin/claude ]; then
            echo "claude already installed at /opt/claude/bin/claude:"
            /opt/claude/bin/claude --version || true
            exit 0
          fi
          echo "installing @anthropic-ai/claude-code into /opt/claude ..."
          NPM_CONFIG_PREFIX=/opt/claude npm install -g --omit=dev @anthropic-ai/claude-code@latest
          test -x /opt/claude/bin/claude
          /opt/claude/bin/claude --version
      volumeMounts:
        - name: claude-bin
          mountPath: /opt/claude

  extraVolumes:
    - name: claude-bin
      persistentVolumeClaim:
        claimName: paperclip-claude-bin

  extraVolumeMounts:
    - name: claude-bin
      mountPath: /opt/claude
      readOnly: true

  deployment:
    mode: authenticated
    exposure: public
    publicURL: https://paperclip.pacholoamit.com
    allowedHostnames:
      - paperclip.pacholoamit.com

  database:
    mode: managed
    managed:
      storageSize: 10Gi
      storageClass: longhorn
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi

  auth:
    secretRef:
      name: paperclip-auth
      key: BETTER_AUTH_SECRET

  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: longhorn

  # adapters.apiKeysSecretRef intentionally omitted — its sole effect is to
  # inject ANTHROPIC_API_KEY / OPENAI_API_KEY env vars from the named Secret,
  # and ANTHROPIC_API_KEY would override CLAUDE_CODE_OAUTH_TOKEN per Claude
  # Code's auth precedence (https://code.claude.com/docs/en/authentication).
  # Re-enable this if you ever need OPENAI_API_KEY or want metered API auth.

  heartbeat:
    enabled: true
    intervalMS: 60000

  security:
    networkPolicy:
      enabled: false
    rbac:
      create: true
    # The upstream Paperclip image's entrypoint starts as root and `gosu node`-
    # drops to UID 1000. The operator's restricted-PSS default (runAsNonRoot,
    # drop ALL caps, no privilege escalation) makes gosu fail with EPERM:
    #   "error: failed switching to \"node\": operation not permitted"
    # Override to permit a root-start; the actual Node.js server still runs as
    # UID 1000 inside the container after gosu drops privileges.
    podSecurityContext:
      fsGroup: 1000
      runAsNonRoot: false
    containerSecurityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]
        add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, FOWNER]

  networking:
    service:
      type: ClusterIP
      port: 3100
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - paperclip.pacholoamit.com
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "100m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: AI agent orchestration platform
        gethomepage.dev/group: Apps/Services
        gethomepage.dev/name: Paperclip

  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
    logging:
      level: info

  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi
