apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hatchet
  namespace: zentech
  annotations:
    kubernetes.io/ingress.class: nginx
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Workflow orchestration engine
    gethomepage.dev/group: Apps/Services
    gethomepage.dev/icon: hatchet
    gethomepage.dev/name: Hatchet
    gethomepage.dev/weight: "3"
spec:
  rules:
  - host: hatchet.pacholoamit.com
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: hatchet-stack-frontend
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hatchet-api
  namespace: zentech
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: hatchet.pacholoamit.com
    http:
      paths:
      - pathType: Prefix
        path: "/api"
        backend:
          service:
            name: hatchet-stack-api
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hatchet-grpc
  namespace: zentech
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: engine.hatchet.pacholoamit.com
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: hatchet-stack-engine
            port:
              number: 7070
