apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
  namespace: zentech
spec:
  interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    timeout: 15m
    remediation:
      retries: 3
  chart:
    spec:
      chart: temporal
      version: ">=1.0.0-0"
      sourceRef:
        kind: HelmRepository
        name: temporal
        namespace: flux-system
      interval: 1m
  values:
    server:
      enabled: true
      config:
        persistence:
          defaultStore: default
          visibilityStore: visibility
          numHistoryShards: 512
          datastores:
            default:
              sql:
                createDatabase: true
                manageSchema: true
                pluginName: postgres12
                driverName: postgres12
                databaseName: temporal
                connectAddr: "temporal-postgresql.zentech.svc.cluster.local:5432"
                connectProtocol: "tcp"
                user: temporal
                existingSecret: temporal-postgresql
                secretKey: password
                maxConns: 20
                maxIdleConns: 20
                maxConnLifetime: "1h"
            visibility:
              sql:
                createDatabase: true
                manageSchema: true
                pluginName: postgres12
                driverName: postgres12
                databaseName: temporal_visibility
                connectAddr: "temporal-postgresql.zentech.svc.cluster.local:5432"
                connectProtocol: "tcp"
                user: temporal
                existingSecret: temporal-postgresql
                secretKey: password
                maxConns: 20
                maxIdleConns: 20
                maxConnLifetime: "1h"
    web:
      enabled: true
      ingress:
        enabled: false
    admintools:
      enabled: true
