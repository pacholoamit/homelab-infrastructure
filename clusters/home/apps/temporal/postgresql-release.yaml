apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal-postgresql
  namespace: zentech
spec:
  interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: postgresql
      version: "16.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami-postgresql
        namespace: flux-system
      interval: 1m
  values:
    global:
      storageClass: longhorn
    auth:
      username: temporal
      database: temporal
      existingSecret: temporal-postgresql
    primary:
      persistence:
        enabled: true
        existingClaim: data-temporal-postgresql-0
