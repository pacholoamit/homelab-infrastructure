---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    metadata.weave.works/description: This is the Weave GitOps Dashboard.  It provides
      a simple way to get insights into your GitOps workloads.
  name: ww-gitops
  namespace: flux-system
spec:
  chart:
    spec:
      chart: weave-gitops
      sourceRef:
        kind: HelmRepository
        name: ww-gitops
  interval: 1h0m0s
  values:
    adminUser:
      create: true
      passwordHash: $2a$10$zcPdpLbmlKz/BgZKTqSWXeQbgu8dekiwI1VROxSfo5GeMK7/iW7oa
      username: admin
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: ww-gitops-weave-gitops
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ww-gitops-weave-gitops
                annotations:
                  glance/name: Weave GitOps
                  glance/icon: https://avatars.githubusercontent.com/u/9976052?s=200&v=4
